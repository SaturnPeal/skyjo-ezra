<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Carte rouge -->
  <rect x="4" y="2" width="56" height="60" rx="10" fill="#C62828"/>
  <rect x="4" y="2" width="56" height="60" rx="10" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <rect x="9" y="7" width="46" height="50" rx="7" fill="rgba(255,255,255,0.08)"/>
  <!-- 12 central bien centré -->
  <text x="32" y="32" text-anchor="middle" dominant-baseline="middle"
    fill="white" font-size="26" font-weight="900"
    font-family="Arial Rounded MT Bold, Arial, sans-serif">12</text>
  <!-- 12 haut gauche -->
  <text x="13" y="14" text-anchor="middle" dominant-baseline="middle"
    fill="rgba(255,255,255,0.75)" font-size="11"
    font-family="Arial Rounded MT Bold, Arial, sans-serif">12</text>
  <!-- 12 bas droite retourné -->
  <text x="51" y="54" text-anchor="middle" dominant-baseline="middle"
    fill="rgba(255,255,255,0.75)" font-size="11"
    font-family="Arial Rounded MT Bold, Arial, sans-serif"
    transform="rotate(180 51 54)">12</text>
</svg>
